<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            gap: 40px;
        }

        .main-image-container {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .main-image {
            max-height: 60vh;
            max-width: 100%;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }

        .images-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .clickable-image {
            width: 200px;
            height: 200px;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            object-fit: cover;
        }

        .clickable-image:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6);
        }

        .clickable-image:active {
            transform: translateY(-2px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background-color: #444444;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translate(-50%, -55%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }

        .modal-header {
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        .provider-buttons {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }

        .provider-btn {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            color: #ffffff;
        }

        .spotify-btn {
            background-color: #1DB954;
        }

        .spotify-btn:hover {
            background-color: #1ed760;
            transform: scale(1.02);
        }

        .apple-btn {
            background-color: #555555;
        }

        .apple-btn:hover {
            background-color: #666666;
            transform: scale(1.02);
        }

        .close-btn {
            color: #aaaaaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 20px;
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: #ffffff;
        }

        @media (max-width: 600px) {
            body {
                gap: 25px;
                padding: 15px;
            }

            .images-container {
                gap: 15px;
            }

            .clickable-image {
                width: 150px;
                height: 150px;
            }

            .modal-content {
                width: 85%;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-image-container">
        <img src="607297854_2080448966046133_3924928542451309877_n.jpg" alt="Main Album Art" class="main-image">
    </div>

    <div class="images-container">
        <img src="https://i.scdn.co/image/ab67616d00001e0262ac1e0d010f965b6acd9826" alt="In Halls Beyond Death" class="clickable-image" data-image="1">
        <img src="https://i.scdn.co/image/ab67616d00001e0252a2fc03b9b68698803b0c89" alt="Cernunnos" class="clickable-image" data-image="2">
    </div>

    <!-- Modal -->
    <div id="providerModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-header">Select Music Provider</div>
            <div class="provider-buttons" id="providerButtons"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('providerModal');
        const closeBtn = document.querySelector('.close-btn');
        const providerButtonsContainer = document.getElementById('providerButtons');

        // Album links
        const albumLinks = {
            1: {
                spotify: 'https://open.spotify.com/album/5MyVXlJSgBcg6mrDcA2WOb?si=pNoimSIBTj6qM60q-JqCvA',
                apple: 'https://music.apple.com/nz/album/cernunnos/1240802832'
            },
            2: {
                spotify: 'https://open.spotify.com/album/6BR8gJVTOAhYbnfIDye9CB?si=gXLMQWMpQwaAnC8cF7NItA',
                apple: 'https://music.apple.com/nz/album/in-halls-beyond-death/1039201060'
            }
        };

        // Add click handlers to images
        document.querySelectorAll('.clickable-image').forEach(img => {
            img.addEventListener('click', function() {
                const imageNum = this.dataset.image;
                showProviderModal(imageNum);
            });

            // Touch support for mobile
            img.addEventListener('touchend', function(e) {
                e.preventDefault();
                const imageNum = this.dataset.image;
                showProviderModal(imageNum);
            });
        });

        function showProviderModal(imageNum) {
            const links = albumLinks[imageNum];
            
            providerButtonsContainer.innerHTML = `
                <a href="${links.spotify}" target="_blank" class="provider-btn spotify-btn">
                    🎵 Open in Spotify
                </a>
                <a href="${links.apple}" target="_blank" class="provider-btn apple-btn">
                    🎵 Open in Apple Music
                </a>
            `;
            
            modal.style.display = 'block';
        }

        // Close modal when X is clicked
        closeBtn.addEventListener('click', function() {
            modal.style.display = 'none';
        });

        // Close modal when clicking outside of it
        window.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.style.display === 'block') {
                modal.style.display = 'none';
            }
        });
    </script>
</body>
</html>
